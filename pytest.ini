[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -m "not training and not e2e and not colab"
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=75
    -v
markers =
    unit: fast deterministic unit tests
    integration: component integration tests runnable locally
    training: short training smoke tests (opt-in)
    e2e: end-to-end pipeline tests (very slow, opt-in)
    slow: tests expected to take materially longer
    colab: tests that require a Colab runtime or Colab-only setup
